<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIVALCE — Dashboard Integral P&L</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--s1:#111827;--s2:#1a2235;--bd:#2a3450;--tx:#e8ecf4;--t2:#8899b4;--ac:#4f8cff;--gn:#00d4aa;--rd:#ff4d6a;--or:#ffb84d;--pu:#a78bfa}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx)}
.header{background:linear-gradient(135deg,#0d1117,#1a2235);border-bottom:1px solid var(--bd);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.header h1{font-size:20px;font-weight:700}.header h1 span{color:var(--ac)}
.header .sub{color:var(--t2);font-size:11px;margin-top:2px}
.params-bar{display:flex;gap:16px;padding:8px 24px;background:var(--s2);border-bottom:1px solid var(--bd);align-items:center;flex-wrap:wrap}
.params-bar label{font-size:10px;color:var(--t2)}
.params-bar input[type=number]{width:72px;background:var(--s1);border:1px solid var(--bd);color:var(--ac);padding:3px 6px;border-radius:4px;font-family:'JetBrains Mono';font-size:11px;text-align:right}
.params-bar .sep{width:1px;height:20px;background:var(--bd)}
.tabs{display:flex;gap:0;background:var(--s1);border-bottom:1px solid var(--bd);padding:0 24px;overflow-x:auto}
.tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--tx)}.tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.tab.sec{color:var(--or)}.tab.sec.active{color:var(--or);border-bottom-color:var(--or)}
.content{padding:20px;max-width:1500px;margin:0 auto}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
.kpi{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:12px;text-align:center}
.kpi .lb{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:1px}
.kpi .vl{font-family:'JetBrains Mono';font-size:18px;font-weight:600;margin-top:4px}
.kpi .delta{font-size:10px;margin-top:3px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:16px}
.card h3{font-size:13px;color:var(--or);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.card.full{grid-column:1/-1}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:var(--s1);color:var(--t2);padding:7px 8px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;z-index:1}
td{padding:4px 8px;border-bottom:1px solid rgba(42,52,80,.4)}
tr:hover{background:rgba(79,140,255,.03)}
.mono{font-family:'JetBrains Mono';font-size:11px}
.neg{color:var(--rd)}.pos{color:var(--gn)}.warn{color:var(--or)}
.tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600}
.tag-ok{background:rgba(0,212,170,.15);color:var(--gn)}
.tag-bad{background:rgba(255,77,106,.15);color:var(--rd)}
.tag-warn{background:rgba(255,184,77,.15);color:var(--or)}
.sr{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.sr .lb{color:var(--t2)}.sr .vl{font-family:'JetBrains Mono';font-weight:600}
.btn-sm{padding:5px 12px;border-radius:6px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-family:'DM Sans';font-size:11px;cursor:pointer}
.btn-sm:hover{border-color:var(--ac);color:var(--ac)}
.btn-load{padding:5px 12px;border-radius:6px;border:1px solid var(--ac);background:rgba(79,140,255,.1);color:var(--ac);font-family:'DM Sans';font-size:11px;font-weight:600;cursor:pointer}
.btn-load:hover{background:var(--ac);color:#fff}
.filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filters select,.filters input{background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:5px 10px;border-radius:6px;font-family:'DM Sans';font-size:11px}
.filters input[type=text]{flex:1;min-width:120px}
input[type=range]{width:60px;height:4px;-webkit-appearance:none;background:var(--bd);border-radius:2px;outline:none;cursor:pointer;vertical-align:middle}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--ac);border-radius:50%;cursor:pointer}
.pv{font-family:'JetBrains Mono';font-size:10px;color:var(--ac);min-width:28px;display:inline-block;text-align:right}
.sidebar{background:var(--s1);border-left:1px solid var(--bd);padding:16px;overflow-y:auto}
.sidebar h3{font-size:13px;margin-bottom:12px;color:var(--or)}
.main-2col{display:grid;grid-template-columns:1fr 300px;min-height:calc(100vh - 200px)}
.bar{height:7px;background:var(--bd);border-radius:4px;margin-top:6px;overflow:hidden;display:flex}
.bar .s{height:100%;transition:width .3s}
.s1{background:var(--ac)}.s2{background:var(--gn)}.s3{background:var(--or)}.s4{background:var(--pu)}
.legend{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--t2)}
.legend i{width:7px;height:7px;border-radius:2px;display:inline-block}
.alert-box{background:rgba(255,77,106,.08);border:1px solid rgba(255,77,106,.25);border-radius:8px;padding:10px;margin-top:10px}
.alert-box h4{color:var(--rd);font-size:11px;margin-bottom:4px}
.alert-box p{font-size:10px;color:var(--t2);padding:1px 0}
@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.row{grid-template-columns:1fr}.main-2col{grid-template-columns:1fr}}
</style>
</head>

// Helper: volumen mensual real del negocio (Σ p.v / 12)
// Única fuente de verdad de volumen del dashboard. Calculado dinámicamente
// desde el array P para reflejar siempre el volumen actual de los productos.
function getVolMensualReal(){
  var total = 0;
  for(var i=0;i<P.length;i++){
    if(typeof P[i].v === 'number' && P[i].v > 0) total += P[i].v;
  }
  return total / 12;
}

// Sincroniza el input hidden pVol y el display visible con el volumen real
function syncGastosHeader(){
  var G=gv();
  var gfd=document.getElementById('pGFdisplay');
  if(gfd) gfd.textContent=(G.gf+G.bo).toFixed(4);
  var modd=document.getElementById('pMODdisplay');
  if(modd) modd.textContent=G.cd.toFixed(4);
}
function syncVolDisplay(){
  var vol = getVolMensualReal();
  var pvolEl = document.getElementById('pVol');
  if(pvolEl) pvolEl.value = vol.toFixed(0);
  var disp = document.getElementById('pVolDisplay');
  if(disp) disp.textContent = vol.toLocaleString('es-AR',{maximumFractionDigits:0});
}

// ===== P&L CALCULATIONS =====
function hasDDP(p){return p.mp!==null&&p.mp!==undefined&&isFinite(p.mp);}
// DDP = FOB × (1 + %nac). Fuente única del costo del insumo.
function getDDP(p){return hasDDP(p)?p.mp*(1+(p.nac||0)):null;}
// Gastos VIVALCE en USD/kg, calculados desde ARS embebidos / TC / volumen (del input).
function gv(){
  var tc=gp('pTC')||G_TC, vol=getVolMensualReal();
  if(tc<=0||vol<=0) return {cd:0,gf:0,bo:0,fin:0,oi:0,gfBoUSDmes:0,cdUSDmes:0,finOiUSDmes:0};
  var G=G_GASTOS_VIVALCE;
  return {
    cd:(G.costo_directo/tc)/vol,   // costo directo USD/kg
    gf:(G.fijos/tc)/vol,           // fijos USD/kg
    bo:(G.back/tc)/vol,            // back office USD/kg
    fin:(G.fin/tc)/vol,            // financiero USD/kg
    oi:(G.otros_imp/tc)/vol,       // otros impuestos USD/kg
    gfBoUSDmes:(G.fijos+G.back)/tc,    // fijos+back USD/mes (KPI)
    cdUSDmes:G.costo_directo/tc,        // costo directo USD/mes
    finOiUSDmes:(G.fin+G.otros_imp)/tc  // financiero+otros imp USD/mes
  };
}
function calcPL(p){
  if(!hasDDP(p)){
    return {pv:p.pv,mp:null,r:p.r||1,mod:0,imp:0,fl:0,nac:0,cmg:null,cmgPct:null,gf:0,ebitda:null,ebitdaPct:null,am:0,ebit:null,ifin:0,cfi:0,rai:null,rev:null,ebitdaAbs:null,cmgAbs:null,v:p.v,l:p.l,p:p.p,o:p.o,lt:p.lt,ss:p.ss,sinDDP:true,f:p.f};
  }
  var pv=p.pv, mp=p.mp, r=p.r||1;
  var G=gv();
  var fl=gp('pFL');
  var impPctDir=gp('pIMP')/100;          // impuestos directos: % sobre venta (4.7%)
  var ddp=getDDP(p);                       // DDP = FOB × (1+%nac)
  var impDir=pv*impPctDir;                 // impuestos directos = 4.7% × venta
  var costoDir=G.cd;                       // costo directo (MOD+E+L) USD/kg
  // CMG = Ventas - DDP - imp.directos - costo directo
  var cmg=pv-ddp/r-impDir-costoDir-fl;
  var cmgPct=pv>0?cmg/pv:0;
  // EBITDA = CMG - fijos - back office
  var gf=G.gf, bo=G.bo;
  var ebitda=cmg-gf-bo;
  var ebitdaPct=pv>0?ebitda/pv:0;
  var am=p.am||0;
  // EBIT = EBITDA - amortizaciones - financiero - otros impuestos
  var fin=G.fin, oi=G.oi;
  var ebit=ebitda-am-fin-oi;
  var mod=costoDir, imp=impDir, nac=p.nac||0;
  // CF inventario computed from inventory tab
  var tna=gp('pTNA')/100;
  var sd=p.lt+p.ss;
  var sk=p.v>0?(p.v/365)*sd:0;
  var su=sk*ddp;
  var cfi=p.v>0?(su*tna)/(p.v*365)*sd:0;
  var ifin=fin;
  var rai=ebit-cfi;
  var rev=pv*p.v;
  var ebitdaAbs=ebitda*p.v;
  var cmgAbs=cmg*p.v;
  return {pv:pv,mp:mp,r:r,mod:mod,imp:imp,fl:fl,nac:nac,cmg:cmg,cmgPct:cmgPct,gf:gf,ebitda:ebitda,ebitdaPct:ebitdaPct,am:am,ebit:ebit,ifin:ifin,cfi:cfi,rai:rai,rev:rev,ebitdaAbs:ebitdaAbs,cmgAbs:cmgAbs,v:p.v,l:p.l,p:p.p,o:p.o,lt:p.lt,ss:p.ss,sinDDP:false,mkG:p.mkG,mkH:p.mkH,mkI:p.mkI,mkJ:p.mkJ,mkK:p.mkK,f:p.f};
}function calcAllPL(){var r=[];for(var i=0;i<P.length;i++)r.push(calcPL(P[i]));return r;}
function totalsPL(items){var rev=0,ebitda=0,cmg=0,vol=0,np=0,nn=0;for(var i=0;i<items.length;i++){var c=items[i];if(c.sinDDP){continue;}rev+=c.rev;ebitda+=c.ebitdaAbs;cmg+=c.cmgAbs;vol+=c.v;if(c.ebitda>0)np++;else nn++;}return{rev:rev,ebitda:ebitda,cmg:cmg,vol:vol,margin:rev>0?(ebitda/rev*100).toFixed(1):'0',cmgMargin:rev>0?(cmg/rev*100).toFixed(1):'0',n:items.length,np:np,nn:nn};}

// ===== INVENTORY CALCULATIONS =====
function calcInv(p){
  var tna=gp('pTNA')/100;
  var sd=p.lt+p.ss;
  var sk=p.v>0?(p.v/365)*sd:0;
  if(p.mp===null||p.mp===undefined){return{sd:sd,sk:sk,su:0,cfd:0,cfs:0,cfp:0,cfa:0};}
  var su=sk*p.mp;
  var cfd=p.v>0?(su*tna)/(p.v*365):0;
  var cfs=cfd*sd;
  var cfp=p.mp>0?cfs/p.mp:0;
  var cfa=cfs*p.v;
  return{sd:sd,sk:sk,su:su,cfd:cfd,cfs:cfs,cfp:cfp,cfa:cfa};
}

  var h='';

function doFPR(){
  var all=calcAllPL();var fl_v=document.getElementById("pr-l").value;var ff_v=document.getElementById("pr-f").value;var fs=document.getElementById("pr-s").value.toLowerCase();
  var fl=gp('pFL'),impPct=gp('pIMP')/100;var Gp=gv();
  // precio por markup: base=(DDP/r + costoDir + flete); precio = base*(1+mk)/(1-impPct)
  function precioMk(c,mk){ if(mk===null||mk===undefined)return null; var base=(getDDP(c)/c.r)+Gp.cd+fl; return base*(1+mk)/(1-impPct); }
  // EBITDA/kg a un precio dado (incluye fijos+back, como el P&L completo)
  function ebAt(c,pp){ if(pp===null)return null; return pp-(getDDP(c)/c.r)-Gp.cd-(pp*impPct)-fl-Gp.gf-Gp.bo; }
  var items=[];
  for(var i=0;i<all.length;i++){var c=all[i];if(c.sinDDP||c.v<=0)continue;if(fl_v!=="ALL"&&c.l!==fl_v)continue;
    if(ff_v!=="ALL"&&(c.f||"Sin clasificar")!==ff_v)continue;if(fs&&(c.p+c.l+(c.f||"")).toLowerCase().indexOf(fs)<0)continue;
    items.push({l:c.l,p:c.p,f:c.f,pv:c.pv,ebitda:c.ebitda,
      pG:precioMk(c,c.mkG),pH:precioMk(c,c.mkH),pI:precioMk(c,c.mkI),pJ:precioMk(c,c.mkJ),pK:precioMk(c,c.mkK),pBE:precioMk(c,0),
      mkG:c.mkG,mkH:c.mkH,mkI:c.mkI,mkJ:c.mkJ,mkK:c.mkK,v:c.v});
  }
  items.sort(function(a,b){return a.l===b.l?(a.p<b.p?-1:1):(a.l<b.l?-1:1);});
  function cell(pp){ return pp===null?'<td class="mono" style="text-align:right;color:var(--t2)">—</td>':'<td class="mono" style="text-align:right">'+fd(pp)+'</td>'; }
  function hdr(label,mk){ var pctTxt=(mk!==null&&mk!==undefined)?' '+(mk*100).toFixed(0)+'%':''; return '<th style="text-align:right">'+label+pctTxt+'</th>'; }
  var h='<table><thead><tr><th>Línea</th><th>Producto</th><th style="text-align:right">P.Actual</th><th style="text-align:right">EBITDA Act</th>';
  h+='<th style="text-align:right;color:var(--t2)">Costo+10%</th><th style="text-align:right;color:var(--or)">Mín Commodity</th><th style="text-align:right;color:var(--ac)">Mín 35%</th><th style="text-align:right;color:var(--ac)">Medio 45%</th><th style="text-align:right;color:var(--gn)">Lista 60%</th><th style="text-align:right;color:var(--rd)">Breakeven</th><th>Vol</th></tr></thead><tbody>';
  for(var i=0;i<items.length;i++){var c=items[i];
    h+='<tr><td style="font-size:10px;color:var(--t2)">'+c.l+'</td><td style="font-weight:500">'+c.p+'</td><td style="font-size:10px;color:var(--t2)">'+(c.f||"Sin clasificar")+'</td>';
    h+='<td class="mono" style="text-align:right">'+fd(c.pv)+'</td>';
    h+='<td class="mono" style="text-align:right;color:'+(c.ebitda>=0?'var(--gn)':'var(--rd)')+'">'+fd(c.ebitda)+'</td>';
    h+=cell(c.pG)+cell(c.pH)+cell(c.pI)+cell(c.pJ)+cell(c.pK)+cell(c.pBE);
    h+='<td class="mono">'+fmt(c.v)+'</td></tr>';
  }
  h+='</tbody></table>';document.getElementById("pr-tbl").innerHTML=h;

function doFU(){

function updG(i,group,val){
  var pct=val/100,a=GA[i];
  if(group==='r1'){var old=a.cdir_r+a.fijo_r;if(old>0){a.cdir_r=pct*(a.cdir_r/old);a.fijo_r=pct*(a.fijo_r/old)}else{a.cdir_r=pct*.5;a.fijo_r=pct*.5}}
  else if(group==='r2'){var old=a.logis_r+a.back_r;if(old>0){a.logis_r=pct*(a.logis_r/old);a.back_r=pct*(a.back_r/old)}else{a.logis_r=pct*.5;a.back_r=pct*.5}}
  else if(group==='v1'){var old=a.cdir_v+a.fijo_v;if(old>0){a.cdir_v=pct*(a.cdir_v/old);a.fijo_v=pct*(a.fijo_v/old)}else{a.cdir_v=pct*.5;a.fijo_v=pct*.5}}
  else if(group==='v2'){var old=a.logis_v+a.back_v;if(old>0){a.logis_v=pct*(a.logis_v/old);a.back_v=pct*(a.back_v/old)}else{a.logis_v=pct*.5;a.back_v=pct*.5}}
  document.getElementById('gv'+i+group).textContent=val+'%';
  renderGastos();
}

function loadGastos(file){
  if(!file)return;var reader=new FileReader();
  reader.onload=function(e){try{
    var wb=XLSX.read(e.target.result,{type:'array',cellFormula:false});var ws=wb.Sheets[wb.SheetNames[0]];var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:0,raw:true});
    var hdrs=rows[0].map(function(h){return String(h||'').toLowerCase().trim()});var cm={};
    hdrs.forEach(function(h,i){if(h.includes('concepto'))cm.concepto=i;else if(h.includes('nombre'))cm.nombre=i;else if(h.includes('posici'))cm.posicion=i;else if(h.includes('empresa'))cm.empresa=i;else if(h.includes('bruto'))cm.bruto=i;else if(h.includes('factor'))cm.factor=i;else if(h.includes('costo final'))cm.costoFinal=i;else if(h.includes('cdir')&&h.includes('recsa'))cm.cdirR=i;else if(h.includes('fijo')&&h.includes('recsa'))cm.fijoR=i;else if(h.includes('log')&&h.includes('recsa'))cm.logisR=i;else if(h.includes('back')&&h.includes('recsa'))cm.backR=i;else if(h.includes('cdir')&&h.includes('vivalce'))cm.cdirV=i;else if(h.includes('fijo')&&h.includes('vivalce'))cm.fijoV=i;else if(h.includes('log')&&h.includes('vivalce'))cm.logisV=i;else if(h.includes('back')&&h.includes('vivalce'))cm.backV=i;});
    G=[];for(var r=1;r<rows.length;r++){var row=rows[r];var concepto=String(row[cm.concepto]||'').trim();var nombre=String(row[cm.nombre]||'').trim();if(!concepto&&!nombre)continue;if(concepto==='RESUMEN'||concepto==='Total')continue;
    var bruto=parseFloat(row[cm.bruto])||0;var factor=parseFloat(row[cm.factor])||0;var cf=parseFloat(row[cm.costoFinal]);if(isNaN(cf)||cf===0)cf=factor===0?bruto:bruto*(1+factor);if(cf===0)continue;
    var pf=function(v){var n=parseFloat(v);return isNaN(n)?0:n};
    G.push({concepto:concepto,nombre:nombre,posicion:String(row[cm.posicion]||'').trim(),empresa:String(row[cm.empresa]||'').trim(),costo_final:cf,pct_cdir_r:pf(row[cm.cdirR]),pct_fijo_r:pf(row[cm.fijoR]),pct_logis_r:pf(row[cm.logisR]),pct_back_r:pf(row[cm.backR]),pct_cdir_v:pf(row[cm.cdirV]),pct_fijo_v:pf(row[cm.fijoV]),pct_logis_v:pf(row[cm.logisV]),pct_back_v:pf(row[cm.backV])});}
    G.forEach(function(g,i){GA[i]={cdir_r:g.pct_cdir_r,fijo_r:g.pct_fijo_r,logis_r:g.pct_logis_r,back_r:g.pct_back_r,cdir_v:g.pct_cdir_v,fijo_v:g.pct_fijo_v,logis_v:g.pct_logis_v,back_v:g.pct_back_v};});
    renderGastos();
  }catch(err){alert('Error: '+err.message);}};reader.readAsArrayBuffer(file);
}

    newP.push({l:String(row[cm.l]||'').trim(),p:prod,pv:pf(row[cm.pv]),mp:pf(row[cm.mp]),r:pf(row[cm.r])||1,v:pf(row[cm.v]),am:0,ifin:0,o:cm.o!==undefined?String(row[cm.o]||'').trim():'LOCAL',lt:cm.lt!==undefined?Math.round(pf(row[cm.lt]))||30:30,ss:cm.ss!==undefined?Math.round(pf(row[cm.ss]))||15:15});}

function _pricingItems(){
  var all=calcAllPL();var fl=gp('pFL'),impPct=gp('pIMP')/100;var Gp=gv();
  function precioMk(c,mk){if(mk===null||mk===undefined)return null;var base=(getDDP(c)/c.r)+Gp.cd+fl;return base*(1+mk)/(1-impPct);}
  function ebAt(c,pp){if(pp===null)return null;return pp-(getDDP(c)/c.r)-Gp.cd-(pp*impPct)-fl-Gp.gf-Gp.bo;}
  var items=[];
  for(var i=0;i<all.length;i++){var c=all[i];if(c.v<=0||c.sinDDP)continue;
    var pG=precioMk(c,c.mkG),pH=precioMk(c,c.mkH),pI=precioMk(c,c.mkI),pJ=precioMk(c,c.mkJ),pK=precioMk(c,c.mkK),pBE=precioMk(c,0);
    items.push({l:c.l,p:c.p,f:c.f,ddp:getDDP(c)/c.r,pAct:c.pv,ebAct:c.ebitda,
      pG:pG,ebG:ebAt(c,pG),pH:pH,ebH:ebAt(c,pH),pI:pI,ebI:ebAt(c,pI),pJ:pJ,ebJ:ebAt(c,pJ),pK:pK,ebK:ebAt(c,pK),pBE:pBE,ebBE:ebAt(c,pBE)});
  }
  items.sort(function(a,b){return a.l.localeCompare(b.l)||a.p.localeCompare(b.p);});
  return items;
}

function cotDoFiltro(){
  var cs = window._cotState;
  cs.lineaFiltro = document.getElementById('cot-linea').value;
  cs.busqueda = document.getElementById('cot-busc').value.toLowerCase();
  
  var lista = '<table style="font-size:11px;width:100%"><thead><tr><th></th><th>Proveedor</th><th>Producto</th><th style="font-size:10px">Familia</th><th style="text-align:right">PV actual</th><th style="text-align:right">DDP</th><th>Estado</th></tr></thead><tbody>';
  
  for(var i=0;i<P.length;i++){
    var p = P[i];
    if(cs.lineaFiltro !== 'ALL' && p.l !== cs.lineaFiltro) continue;
    if(cs.busqueda && (p.p+' '+p.l).toLowerCase().indexOf(cs.busqueda) === -1) continue;
    
    var sinDDP = (p.mp === null || p.mp === undefined);
    var ddpCalc = sinDDP ? null : p.mp * (1 + (p.nac||0));
    var marker = (i === cs.productoP_idx) ? '▶' : '';
    var rowStyle = (i === cs.productoP_idx) ? 'background:rgba(79,140,255,0.15)' : '';
    
    if(sinDDP){
      lista += '<tr style="opacity:0.45;cursor:not-allowed" title="Producto sin %nac definido. No se puede cotizar hasta que Compras complete el dato en DDP ESTANDAR."><td style="width:18px"></td><td style="font-size:10px;color:var(--t2)">'+p.l+'</td><td>'+p.p+'</td><td class="mono" style="text-align:right">'+fd(p.pv)+'</td><td class="mono" style="text-align:right;color:var(--t2)">s/d</td><td><span style="color:#ffa500;font-size:10px">⚠ Sin DDP</span></td></tr>';
    } else {
      lista += '<tr style="cursor:pointer;'+rowStyle+'" onclick="cotSelectProduct('+i+')"><td style="width:18px;color:var(--ac);font-weight:bold">'+marker+'</td><td style="font-size:10px;color:var(--t2)">'+p.l+'</td><td>'+p.p+'</td><td class="mono" style="text-align:right">'+fd(p.pv)+'</td><td class="mono" style="text-align:right">'+fd(ddpCalc)+'</td><td><span style="color:var(--gn);font-size:10px">✓ OK</span></td></tr>';
    }
  }
  lista += '</tbody></table>';
  document.getElementById('cot-lista').innerHTML = lista;
}

function cotSelectProduct(idx){
  var cs = window._cotState;

  cotDoFiltro();

function cotInicializar(){
  var cs = window._cotState;
  document.getElementById('cot-escenario').style.display = 'block';
  document.getElementById('cot-botones').style.display = 'flex';
  var p = P[cs.productoP_idx];

function cotVolFromRange(){

function cotPrecioFromRange(){

function cotCalcular(){
  var cs = window._cotState;
  if(cs.productoP_idx < 0) return;
  var p = P[cs.productoP_idx];
  if(p.mp === null || p.mp === undefined) return;
  
  cs.volMensual = parseFloat(document.getElementById('cot-vol').value) || 0;
  cs.precio = parseFloat(document.getElementById('cot-precio').value) || 0;
  var pr = document.getElementById('cot-precio-range');
  if(pr){ pr.max = (p.pv * 2).toFixed(2); pr.value = cs.precio; }
  var vr = document.getElementById('cot-vol-range');
  if(vr) vr.value = cs.volMensual;
  
  var ddp = p.mp * (1 + (p.nac || 0));
  var r = p.r || 1;
  var Gc = gv();
  var fl = gp('pFL');
  var impPct = gp('pIMP')/100;
  var costoDir = Gc.cd;
  var GF_actual = Gc.gf + Gc.bo;
  
  var costoBase = ddp/r + costoDir + fl;
  
  var volActual = getVolMensualReal();
  var GF_totalUSD = GF_actual * volActual;
  var volNuevo = volActual + cs.volMensual;
  var GF_nuevo = volNuevo > 0 ? GF_totalUSD / volNuevo : GF_actual;
  
  function calcEbitda(pp){
    var imp_pp = pp * impPct;
    return pp - costoBase - imp_pp - GF_nuevo;
  }
  
  var pCMG15 = costoBase / (1 - impPct - 0.15);
  var pBE = (costoBase + GF_nuevo) / (1 - impPct);
  var p20 = pBE * 1.20;
  var p30 = pBE * 1.30;
  var p40 = pBE * 1.40;
  
  function ebMensual(pp){ return calcEbitda(pp) * cs.volMensual; }
  function ebAnual(pp){ return ebMensual(pp) * 12; }
  
  var ahorroGF = GF_actual - GF_nuevo;
  var infoH = '<strong>Volumen actual empresa:</strong> '+fmt(volActual)+' kg/mes → <strong>Nuevo total:</strong> '+fmt(volNuevo)+' kg/mes ';
  infoH += '(<span style="color:var(--gn)">+'+((cs.volMensual/volActual)*100).toFixed(1)+'%</span>)';
  infoH += '<br><strong>GF/kg actual:</strong> USD '+GF_actual.toFixed(4)+' → <strong>GF/kg con cliente:</strong> USD '+GF_nuevo.toFixed(4);
  infoH += ' (<span style="color:var(--gn)">ahorro USD '+ahorroGF.toFixed(4)+'/kg</span>)';
  document.getElementById('cot-info-abs').innerHTML = infoH;
  
  var h = '';
  h += '<div style="border-bottom:1px solid var(--bd);padding-bottom:14px;margin-bottom:14px">';
  h += '<div style="font-weight:600;color:var(--ac);margin-bottom:8px;font-size:12px">3️⃣ Escenarios de precio (incluyendo absorción del cliente nuevo)</div>';
  h += '<table style="font-size:11px;width:100%"><thead><tr><th>Escenario</th><th style="text-align:right">Precio (USD/kg)</th><th style="text-align:right">EBITDA (USD/kg)</th><th style="text-align:right">EBITDA mensual</th><th style="text-align:right">EBITDA anual</th></tr></thead><tbody>';
  
  var escenarios = [
    {nombre:'CMG 15%', precio:pCMG15, color:'var(--ac)', bg:'rgba(79,140,255,0.08)'},
    {nombre:'Breakeven', precio:pBE, color:'var(--or)', bg:'rgba(255,184,77,0.10)'},
    {nombre:'+20% sobre BE', precio:p20, color:'var(--gn)', bg:'rgba(0,212,170,0.10)'},
    {nombre:'+30% sobre BE', precio:p30, color:'var(--gn)', bg:'rgba(0,212,170,0.12)'},
    {nombre:'+40% sobre BE', precio:p40, color:'var(--gn)', bg:'rgba(0,212,170,0.14)'}
  ];
  escenarios.forEach(function(e){
    h += '<tr style="background:'+e.bg+'"><td style="color:'+e.color+';font-weight:600">'+e.nombre+'</td>';
    h += '<td class="mono" style="text-align:right">'+fd(e.precio)+'</td>';
    h += '<td class="mono" style="text-align:right">'+fd(calcEbitda(e.precio))+'</td>';
    h += '<td class="mono" style="text-align:right">'+fmt(ebMensual(e.precio))+'</td>';
    h += '<td class="mono" style="text-align:right">'+fmt(ebAnual(e.precio))+'</td></tr>';
  });
  h += '<tr style="background:rgba(79,140,255,0.25);border:2px solid var(--ac)"><td style="color:var(--ac);font-weight:bold">🎯 Tu cotización</td>';
  h += '<td class="mono" style="text-align:right;font-weight:bold">'+fd(cs.precio)+'</td>';
  h += '<td class="mono" style="text-align:right;font-weight:bold">'+fd(calcEbitda(cs.precio))+'</td>';
  h += '<td class="mono" style="text-align:right;font-weight:bold">'+fmt(ebMensual(cs.precio))+'</td>';
  h += '<td class="mono" style="text-align:right;font-weight:bold">'+fmt(ebAnual(cs.precio))+'</td></tr>';
  h += '</tbody></table>';
  
  var msg = '', msgColor = '';
  if(cs.precio < pBE){ msg = '🔴 Estás por debajo del breakeven — perdés plata con cada kg'; msgColor = 'var(--rd)'; }
  else if(cs.precio < p20){ msg = '🟠 Zona ajustada — apenas cubrís costos, margen débil'; msgColor = 'var(--or)'; }
  else if(cs.precio < p40){ msg = '🟢 Zona saludable — margen razonable para el negocio'; msgColor = 'var(--gn)'; }
  else { msg = '✨ Excelente margen — la cotización tiene buen colchón'; msgColor = 'var(--gn)'; }
  h += '<div style="margin-top:8px;padding:8px 12px;background:rgba(0,0,0,0.2);border-left:3px solid '+msgColor+';color:'+msgColor+';font-size:11px;font-weight:600">'+msg+'</div>';
  h += '</div>';
  
  var ebActual = 0, revActual = 0;
  for(var j=0;j<P.length;j++){
    var pp = P[j];
    if(pp.mp === null || pp.v === 0) continue;
    var ddp_j = pp.mp * (1 + (pp.nac||0));
    var costoBase_j = ddp_j/(pp.r||1) + costoDir + fl;
    var imp_j = pp.pv * impPct;
    var cmg_j = pp.pv - costoBase_j - imp_j;
    ebActual += (cmg_j - GF_actual) * pp.v;
    revActual += pp.pv * pp.v;
  }
  var ebConCliente = 0;
  for(var j=0;j<P.length;j++){
    var pp = P[j];
    if(pp.mp === null || pp.v === 0) continue;
    var ddp_j = pp.mp * (1 + (pp.nac||0));
    var costoBase_j = ddp_j/(pp.r||1) + costoDir + fl;
    var imp_j = pp.pv * impPct;
    var cmg_j = pp.pv - costoBase_j - imp_j;
    ebConCliente += (cmg_j - GF_nuevo) * pp.v;
  }
  ebConCliente += ebAnual(cs.precio);
  var revConCliente = revActual + cs.precio * cs.volMensual * 12;
  var deltaEbitda = ebConCliente - ebActual;
  
  h += '<div style="border-bottom:1px solid var(--bd);padding-bottom:14px;margin-bottom:14px">';
  h += '<div style="font-weight:600;color:var(--ac);margin-bottom:8px;font-size:12px">4️⃣ Impacto en negocio total</div>';
  h += '<table style="font-size:11px;width:100%"><thead><tr><th></th><th style="text-align:right">Sin cliente</th><th style="text-align:right">Con cliente</th><th style="text-align:right">Diferencia</th></tr></thead><tbody>';
  h += '<tr><td>Revenue anual</td><td class="mono" style="text-align:right">USD '+fmt(revActual)+'</td><td class="mono" style="text-align:right">USD '+fmt(revConCliente)+'</td><td class="mono" style="text-align:right;color:var(--gn)">+USD '+fmt(revConCliente-revActual)+'</td></tr>';
  var deltaColor = deltaEbitda > 0 ? 'var(--gn)' : 'var(--rd)';
  h += '<tr><td>EBITDA anual</td><td class="mono" style="text-align:right">USD '+fmt(ebActual)+'</td><td class="mono" style="text-align:right">USD '+fmt(ebConCliente)+'</td><td class="mono" style="text-align:right;color:'+deltaColor+'">'+(deltaEbitda>=0?'+':'')+'USD '+fmt(deltaEbitda)+'</td></tr>';
  h += '</tbody></table>';
  var verbo = deltaEbitda > 0 ? '✅ <strong>MEJORA</strong>' : '❌ <strong>EMPEORA</strong>';
  h += '<div style="margin-top:8px;padding:8px 12px;background:rgba(0,0,0,0.2);border-left:3px solid '+deltaColor+';font-size:11px">Tomar este cliente '+verbo+' el EBITDA total en <strong style="color:'+deltaColor+'">USD '+fmt(Math.abs(deltaEbitda))+'</strong> anuales</div>';
  h += '</div>';
  
  var GF_meta_max = cs.precio*(1-impPct) - costoBase;
  h += '<div style="margin-bottom:0">';
  h += '<div style="font-weight:600;color:var(--ac);margin-bottom:8px;font-size:12px">5️⃣ Punto de quiebre</div>';
  if(GF_meta_max <= 0){
    h += '<div style="padding:10px;background:rgba(255,77,106,0.10);border-left:3px solid var(--rd);font-size:11px;color:var(--rd)">⚠ Al precio USD '+fd(cs.precio)+' no se cubre el costo base aun con volumen infinito. Subir el precio o bajar costos.</div>';
  } else {
    var volMensualMinimo = GF_totalUSD / GF_meta_max;
    var volClienteMinimo = volMensualMinimo - volActual;
    if(volClienteMinimo <= 0){
      h += '<div style="padding:10px;background:rgba(0,212,170,0.10);border-left:3px solid var(--gn);font-size:11px;color:var(--gn)">✓ Al precio USD '+fd(cs.precio)+', el volumen actual ya cubre el breakeven. Cualquier kg del cliente es ganancia.</div>';
    } else {
      var cumple = cs.volMensual >= volClienteMinimo;
      var col = cumple ? 'var(--gn)' : 'var(--or)';
      h += '<div style="padding:10px;background:rgba(0,0,0,0.2);border-left:3px solid '+col+';font-size:11px">';
      h += 'Al precio <strong>USD '+fd(cs.precio)+'</strong>, el cliente debe comprar al menos <strong style="color:'+col+'">'+fmt(volClienteMinimo)+' kg/mes</strong> para que valga la pena.<br>';
      h += 'Tu cotización es de '+fmt(cs.volMensual)+' kg/mes → ';
      h += cumple ? '<strong style="color:var(--gn)">✓ Supera el mínimo</strong>' : '<strong style="color:var(--or)">⚠ Falta volumen: '+fmt(volClienteMinimo - cs.volMensual)+' kg/mes</strong>';
      h += '</div>';
    }
  }
  h += '</div>';
  
  document.getElementById('cot-secciones').innerHTML = h;
}

}

function cotExportExcel(){
  var cs = window._cotState;
  if(cs.productoP_idx < 0){ alert('Seleccioná un producto primero.'); return; }
  var p = P[cs.productoP_idx];
  var ddp = p.mp * (1 + (p.nac || 0));
  var r = p.r || 1;
  var Gce = gv(), fl = gp('pFL');
  var impPct = gp('pIMP')/100;
  var costoDir = Gce.cd, GF_actual = Gce.gf + Gce.bo;
  var costoBase = ddp/r + costoDir + fl;
  var volActual = getVolMensualReal();
  var GF_totalUSD = GF_actual * volActual;
  var GF_nuevo = GF_totalUSD / (volActual + cs.volMensual);
  function calcE(pp){ return pp - costoBase - pp*impPct - GF_nuevo; }
  var pCMG15 = costoBase / (1 - impPct - 0.15);
  var pBE = (costoBase + GF_nuevo) / (1 - impPct);
  var csv = '\uFEFFEscenario,Precio USD/kg,EBITDA USD/kg,EBITDA mensual,EBITDA anual\n';
  var rows = [['CMG 15%',pCMG15],['Breakeven',pBE],['+20% sobre BE',pBE*1.20],['+30% sobre BE',pBE*1.30],['+40% sobre BE',pBE*1.40],['Tu cotizacion',cs.precio]];
  rows.forEach(function(rr){
    var pp = rr[1], ek = calcE(pp), em = ek*cs.volMensual, ea = em*12;
    csv += rr[0]+','+pp.toFixed(4)+','+ek.toFixed(4)+','+em.toFixed(2)+','+ea.toFixed(2)+'\n';
  });
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'VIVALCE_Cotizacion_'+p.p.replace(/[^a-zA-Z0-9]/g,'_')+'_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}



// ===== EXPORTAR A EXCEL =====
function exportPL(){
  var all=calcAllPL();
  var Gr=gv();
  var tc=gp('pTC');
  var fechaExp=new Date().toLocaleDateString('es-AR');
  
  // Construir filas
  var rows=[];
  // Header
  rows.push([
    'Linea','Producto','Familia','Origen',
    'Precio USD/kg','FOB USD/kg','% Nac','Rendimiento','DDP USD/kg',
    'Costo Dir USD/kg','Imp Dir USD/kg','Flete USD/kg',
    'CMG USD/kg','CMG %','Fijos+Back USD/kg','EBITDA USD/kg','EBITDA %',
    'Volumen anual kg','Revenue anual USD','EBITDA anual USD','Status'
  ]);
  
  // Ordenar productos: con DDP primero (por revenue desc), luego sin DDP
  var sorted=all.slice().sort(function(a,b){
    if(a.sinDDP&&!b.sinDDP)return 1;
    if(!a.sinDDP&&b.sinDDP)return -1;
    return (b.rev||0)-(a.rev||0);
  });
  
  for(var i=0;i<sorted.length;i++){
    var c=sorted[i];
    var p=P.find(function(x){return x.p===c.p;});
    var ddp=c.sinDDP?null:getDDP(c)/c.r;
    var impDir=c.sinDDP?null:c.pv*(gp('pIMP')/100);
    var fijosBack=Gr.gf+Gr.bo;
    var status=c.sinDDP?'s/d': (c.ebitda>0?(c.ebitdaPct>0.1?'OK':'BORDE'):'PIERDE');
    
    rows.push([
      c.l||'',
      c.p||'',
      c.f||'Sin clasificar',
      p&&p.o||'',
      c.pv||0,
      c.sinDDP?null:p.mp,
      c.sinDDP?null:(p.nac||0),
      p&&p.r||1,
      ddp,
      c.sinDDP?null:Gr.cd,
      impDir,
      c.sinDDP?null:gp('pFL'),
      c.cmg,
      c.cmgPct,
      fijosBack,
      c.ebitda,
      c.ebitdaPct,
      c.v||0,
      c.rev,
      c.ebitdaAbs,
      status
    ]);
  }
  
  // Crear worksheet y workbook
  var ws=XLSX.utils.aoa_to_sheet(rows);
  
  // Anchos de columna
  ws['!cols']=[
    {wch:24},{wch:28},{wch:22},{wch:8},
    {wch:12},{wch:11},{wch:8},{wch:11},{wch:12},
    {wch:14},{wch:12},{wch:12},
    {wch:12},{wch:10},{wch:16},{wch:14},{wch:10},
    {wch:14},{wch:16},{wch:16},{wch:10}
  ];
  
  // Formato de números: % para columnas N (cmgPct) y Q (ebitdaPct); USD para precios; entero para volumen
  // Aplicar formato fila por fila (excepto el header)
  for(var r=1;r<rows.length;r++){
    // Porcentajes (cols N=14, Q=17 1-based; en sheetjs son 13 y 16 0-based)
    var pctCols=[13,16]; // CMG% y EBITDA%
    pctCols.forEach(function(c){
      var cell=ws[XLSX.utils.encode_cell({r:r,c:c})];
      if(cell&&typeof cell.v==='number') cell.z='0.0%';
    });
    // Volumen entero
    var volCell=ws[XLSX.utils.encode_cell({r:r,c:17})];
    if(volCell&&typeof volCell.v==='number') volCell.z='#,##0';
    // Revenue y EBITDA totales
    [18,19].forEach(function(c){
      var cell=ws[XLSX.utils.encode_cell({r:r,c:c})];
      if(cell&&typeof cell.v==='number') cell.z='#,##0';
    });
    // Precios y costos USD con 2-4 decimales
    [4,5,8,9,10,11,12,14,15].forEach(function(c){
      var cell=ws[XLSX.utils.encode_cell({r:r,c:c})];
      if(cell&&typeof cell.v==='number') cell.z='0.0000';
    });
  }
  
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'P&L Detallado');
  
  // Nombre con fecha
  var d=new Date();
  var fname='VIVALCE_PL_'+d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'.xlsx';
  XLSX.writeFile(wb,fname);
}
